<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Constellation lines -->
  <line x1="16" y1="5"  x2="9"  y2="15" stroke="white" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="16" y1="5"  x2="23" y2="15" stroke="white" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="9"  y1="15" x2="12" y2="24" stroke="white" stroke-width="0.8" stroke-opacity="0.25"/>
  <line x1="23" y1="15" x2="20" y2="24" stroke="white" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Stars -->
  <!-- Top star (brightest) -->
  <circle cx="16" cy="5"  r="2.8" fill="white" fill-opacity="0.97"/>

  <!-- Shoulder stars -->
  <circle cx="9"  cy="15" r="2.2" fill="white" fill-opacity="0.82"/>
  <circle cx="23" cy="15" r="2.2" fill="white" fill-opacity="0.82"/>

  <!-- Bottom stars (dimmer) -->
  <circle cx="12" cy="24" r="1.7" fill="white" fill-opacity="0.6"/>
  <circle cx="20" cy="24" r="1.7" fill="white" fill-opacity="0.6"/>
</svg>
