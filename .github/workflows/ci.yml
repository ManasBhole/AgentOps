name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies (SDK)
        working-directory: ./sdk
        run: go mod download

      - name: Install dependencies (API)
        working-directory: ./api
        run: go mod download

      - name: Run gofmt (SDK)
        working-directory: ./sdk
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'go fmt ./...'"
            gofmt -d .
            exit 1
          fi

      - name: Run gofmt (API)
        working-directory: ./api
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'go fmt ./...'"
            gofmt -d .
            exit 1
          fi

      - name: Run go vet (SDK)
        working-directory: ./sdk
        run: go vet ./...

      - name: Run go vet (API)
        working-directory: ./api
        run: go vet ./...

      - name: Run tests (SDK)
        working-directory: ./sdk
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run tests (API)
        working-directory: ./api
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage (SDK)
        uses: codecov/codecov-action@v3
        with:
          file: ./sdk/coverage.out
          flags: sdk
          name: sdk-coverage

      - name: Upload coverage (API)
        uses: codecov/codecov-action@v3
        with:
          file: ./api/coverage.out
          flags: api
          name: api-coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build SDK
        working-directory: ./sdk
        run: go build ./...

      - name: Build API
        working-directory: ./api
        run: |
          CGO_ENABLED=0 GOOS=linux go build -o agentops-api ./main.go

      - name: Upload API artifact
        uses: actions/upload-artifact@v3
        with:
          name: agentops-api
          path: api/agentops-api
          retention-days: 7

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Lint
        working-directory: ./dashboard
        run: npm run lint || true

      - name: Build
        working-directory: ./dashboard
        run: npm run build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v3
        with:
          name: agentops-dashboard
          path: dashboard/dist
          retention-days: 7

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build, build-dashboard]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/agentops-api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
