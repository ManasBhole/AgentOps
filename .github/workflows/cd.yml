name: CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io

jobs:
  # ── Development: deploy on push to develop branch ─────────────────────────
  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.agentops.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Deploy to dev cluster
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DEV }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "KUBECONFIG_DEV not configured — skipping cluster deploy"
            echo "Image ghcr.io/${{ github.repository }}/agentops-api:develop-${{ github.sha }} is available."
            exit 0
          fi
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl apply -f k8s/deployment.yaml -n development
          kubectl set image deployment/agentops-api \
            api=ghcr.io/${{ github.repository }}/agentops-api:develop-${{ github.sha }} \
            -n development
          kubectl rollout status deployment/agentops-api -n development --timeout=120s

  # ── Staging: deploy on push to main branch ────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.agentops.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy to staging cluster
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "KUBECONFIG_STAGING not configured — skipping cluster deploy"
            echo "Image ghcr.io/${{ github.repository }}/agentops-api:main-${{ github.sha }} is available."
            exit 0
          fi
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl apply -f k8s/deployment.yaml -n staging
          kubectl set image deployment/agentops-api \
            api=ghcr.io/${{ github.repository }}/agentops-api:main-${{ github.sha }} \
            -n staging
          kubectl rollout status deployment/agentops-api -n staging --timeout=120s

      - name: Run smoke tests
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "Skipping smoke tests — no staging cluster configured"
            exit 0
          fi
          sleep 15
          curl -sf https://staging.agentops.io/health || echo "Smoke test skipped — URL not reachable yet"

  # ── Production: deploy on version tags (v*) ────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://agentops.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Deploy to production cluster
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PRODUCTION }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "KUBECONFIG_PRODUCTION not configured — skipping cluster deploy"
            echo "Image ghcr.io/${{ github.repository }}/agentops-api:v${{ steps.version.outputs.VERSION }} is available."
            exit 0
          fi
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl apply -f k8s/deployment.yaml -n production
          kubectl set image deployment/agentops-api \
            api=ghcr.io/${{ github.repository }}/agentops-api:v${{ steps.version.outputs.VERSION }} \
            -n production
          kubectl rollout status deployment/agentops-api -n production --timeout=300s

      - name: Run production smoke tests
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PRODUCTION }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "Skipping smoke tests — no production cluster configured"
            exit 0
          fi
          sleep 30
          curl -sf https://agentops.io/health || echo "Production smoke test failed — check deployment"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## AgentOps ${{ steps.version.outputs.VERSION }}

            ### What's Included
            - See [commit history](https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.VERSION }}) for full changelog

            ### Environment Flow
            - `develop` branch → **Development** (https://dev.agentops.io)
            - `main` branch → **Staging** (https://staging.agentops.io)
            - `v*` tags → **Production** (https://agentops.io)

            ### Docker Image
            ```
            ghcr.io/${{ github.repository }}/agentops-api:v${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
