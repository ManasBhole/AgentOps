name: CD Pipeline

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  Environment strategy                                                        │
# │  develop  branch ──► dev-westus3   (auto, no approval)                      │
# │  main     branch ──► stage-westus3 (auto, no approval)                      │
# │  v* tag   ────────► prod-eastus2  (5 min wait + manual approval required)   │
# └─────────────────────────────────────────────────────────────────────────────┘

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'stage-westus3'
        type: choice
        options:
          - dev-westus3
          - stage-westus3
          - prod-eastus2

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}/agentops-api

jobs:

  # ── Build & push Docker image (shared across all envs) ────────────────────
  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=develop-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── dev-westus3: auto-deploy on push to develop ───────────────────────────
  deploy-dev:
    name: Deploy → dev-westus3
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/develop'
    environment:
      name: dev-westus3
      url: https://dev.agentops.io

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - name: Deploy to dev-westus3
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DEV }}
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "⚠ KUBECONFIG_DEV not set — skipping cluster deploy"
            echo "Image available: ${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
            exit 0
          fi
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl apply -f k8s/deployment.yaml -n dev-westus3
          kubectl set image deployment/agentops-api \
            api=${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n dev-westus3
          kubectl rollout status deployment/agentops-api -n dev-westus3 --timeout=120s

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://dev.agentops.io/health \
            && echo "✅ dev-westus3 healthy" \
            || echo "⚠ Health check skipped — URL not reachable"

  # ── stage-westus3: auto-deploy on push to main ────────────────────────────
  deploy-stage:
    name: Deploy → stage-westus3
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main'
    environment:
      name: stage-westus3
      url: https://staging.agentops.io

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - name: Deploy to stage-westus3
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_STAGING }}
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "⚠ KUBECONFIG_STAGING not set — skipping cluster deploy"
            echo "Image available: ${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
            exit 0
          fi
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl apply -f k8s/deployment.yaml -n stage-westus3
          kubectl set image deployment/agentops-api \
            api=${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n stage-westus3
          kubectl rollout status deployment/agentops-api -n stage-westus3 --timeout=120s

      - name: Smoke test
        run: |
          sleep 15
          curl -sf https://staging.agentops.io/health \
            && echo "✅ stage-westus3 healthy" \
            || echo "⚠ Health check skipped — URL not reachable"

  # ── prod-eastus2: gated deploy on v* tag (5 min wait + approval) ──────────
  deploy-prod:
    name: Deploy → prod-eastus2
    runs-on: ubuntu-latest
    needs: build-image
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: prod-eastus2
      url: https://agentops.io

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: azure/setup-kubectl@v3

      - name: Deploy to prod-eastus2
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PRODUCTION }}
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "⚠ KUBECONFIG_PRODUCTION not set — skipping cluster deploy"
            echo "Image available: ${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
            exit 0
          fi
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl apply -f k8s/deployment.yaml -n prod-eastus2
          kubectl set image deployment/agentops-api \
            api=${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n prod-eastus2
          kubectl rollout status deployment/agentops-api -n prod-eastus2 --timeout=300s

      - name: Smoke test
        run: |
          sleep 30
          curl -sf https://agentops.io/health \
            && echo "✅ prod-eastus2 healthy" \
            || echo "⚠ Health check skipped — URL not reachable"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## AgentOps v${{ steps.version.outputs.VERSION }}

            ### Deployment flow
            | Branch/Tag | Environment | Region |
            |---|---|---|
            | `develop` | dev-westus3 | West US 3 |
            | `main` | stage-westus3 | West US 3 |
            | `v*` tag | prod-eastus2 | East US 2 |

            ### Docker image
            ```
            ${{ env.IMAGE_NAME }}:${{ needs.build-image.outputs.image_tag }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
