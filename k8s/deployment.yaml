apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentops-api
  template:
    metadata:
      labels:
        app: agentops-api
    spec:
      containers:
      - name: api
        image: agentops/api:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agentops-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: agentops-secrets
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: agentops-api
  namespace: default
spec:
  selector:
    app: agentops-api
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
