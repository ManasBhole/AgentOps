databases:
  - name: orion-db
    databaseName: orion
    user: orion
    plan: free

services:
  - type: web
    name: orion-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: orion-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://orion-ai-dashboard.vercel.app
      - key: LLM_API_KEY
        sync: false
