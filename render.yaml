databases:
  - name: orion-db
    databaseName: orion
    user: orion
    plan: free

services:
  - type: web
    name: orion-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: orion-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://orion-ai-dashboard.vercel.app
      - key: LLM_API_KEY
        sync: false

  - type: web
    name: orion-dashboard
    runtime: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: ./dashboard/dist
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://orion-api.onrender.com/api/$1
      - type: rewrite
        source: /auth/*
        destination: https://orion-api.onrender.com/auth/$1
      - type: rewrite
        source: /*
        destination: /index.html
